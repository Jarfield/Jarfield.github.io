title: Embedding Research Hub
subtitle: ''
description: 面向 Embedding 与 Dense Retrieval 研究的长期知识仓库
keywords: Embedding, Dense Retrieval, Text Embedding, Research Notes
author: Jarfield
language: zh-CN
timezone: Asia/Shanghai
url: https://Jarfield.github.io
permalink: ':year/:month/:day/:title/'
permalink_defaults: null
pretty_urls:
  trailing_index: true
  trailing_html: true
root: /
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: ':lang'
skip_render: null
new_post_name: ':title.md'
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: false
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  line_threshold: 0
  tab_replace: "  "
  wrap: true
  enable: true
  hljs: true
prismjs:
  preprocess: true
  line_number: true
  line_threshold: 0
  tab_replace: ""
index_generator:
  path: notes
  per_page: 10
  order_by: '-date'
default_category: uncategorized
category_map: null
tag_map: null
meta_generator: true
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime
per_page: 6
pagination_dir: page
include: null
exclude: null
ignore: null
theme: icarus
deploy:
  type: git
  repo: git@github.com:Jarfield/Jarfield.github.io.git
  branch: main
mathjax:
  tags: all
  single_dollar: true
  cjk_width: 0.9
  normal_width: 0.6
  append_css: true
  every_page: false
  packages:
  extension_options: {}
